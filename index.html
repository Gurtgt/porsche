<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

</head>
<body>
<button id="lang-toggle" class="lang-btn">EN</button>
  <div class="background"></div>

  <div class="container">
    
    <!-- Profile -->
    <div class="profile">
      <img src="Screenshot 2026-05-04 021931.png" alt="Profile Picture">
      <h1 data-key="title">Porsche</h1>
      <p data-key="desc">
  Im a gorilla tag youtuber and a gt competitive player. (real name is Porsche 911 Carrera T) I sell and create portfolios too.
</p>
    </div>

    <!-- Glass Card -->
    <div class="card">
      <a href="https://www.youtube.com/@porsche911carrerat" class="link" target="_blank">
  <span>@porsche911carrerat</span>
  <i class="fa-brands fa-youtube"></i>
</a>


      <a href="https://www.tiktok.com/@porsche911carrerat" class="link" target="_blank">
  <span>@porsche911carrerat</span>
  <i class="fa-brands fa-tiktok"></i>
</a>

      <a href="#" class="link">
        <span>Portfolio</span>
        <i class="fa-solid fa-globe"></i>
      </a>

      <a href="https://discord.gg/qgPjz7cXcp" class="link" target="_blank">
  <span>@porsche911carrerat</span>
  <i class="fa-brands fa-discord"></i>
</a>
    </div>



    <script>
const toggleBtn = document.getElementById("lang-toggle");

let currentLang = localStorage.getItem("lang") || "en";

const translations = {
  en: {
    title: "Porsche",
    desc: "Im a gorilla tag youtuber and a gt competitive player. (real name is Porsche 911 Carrera T) I sell and create portfolios too.",
    yt: "@porsche911carrerat"
  },
  de: {
    title: "Porsche",
    desc: "Ich bin ein Gorilla Tag YouTuber und ein GT Competitive Spieler. (echter Name ist Porsche 911 Carrera T) Ich erstelle und verkaufe auch Portfolios.",
    yt: "@porsche911carrerat"
  }
};

function updateLanguage() {
  document.querySelectorAll("[data-key]").forEach(el => {
    const key = el.getAttribute("data-key");
    el.textContent = translations[currentLang][key];
  });

  toggleBtn.textContent = currentLang.toUpperCase();
}

toggleBtn.addEventListener("click", () => {
  currentLang = currentLang === "en" ? "de" : "en";
  localStorage.setItem("lang", currentLang);
  updateLanguage();
});

updateLanguage();
</script>
</body>
</html>
